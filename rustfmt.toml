# rustfmt config — règles de formatage Rust pour le workspace OneClick KVM.
#
# Ces options sont stable (pas nightly-only) — `cargo fmt` les applique avec
# la toolchain stable MSVC.

edition = "2021"
max_width = 100
hard_tabs = false
tab_spaces = 4
newline_style = "Unix"
use_small_heuristics = "Default"
reorder_imports = true
reorder_modules = true
remove_nested_parens = true
match_arm_leading_pipes = "Never"
force_explicit_abi = true
