# Dependabot config — vérifie hebdomadairement les MAJ de dépendances.
#
# **Politique** : patch + minor seulement, on **ignore les majors** pour
# l'alpha (les bumps majors openh264 0.8→0.9, vite 6→8, typescript 5→6 cassent
# souvent l'API et méritent un effort manuel + tests E2E). Levez l'ignore-list
# au cas par cas quand vous êtes prêt à investiguer un major.

version: 2
updates:
  # === Rust workspace ===
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/Paris
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      crypto:
        patterns:
          - "aes-gcm"
          - "chacha20poly1305"
          - "x25519-dalek"
          - "ed25519-dalek"
          - "hkdf"
          - "sha2"
          - "blake3"
          - "rand_core"
          - "getrandom"
          - "zeroize"
          - "subtle"
      tokio:
        patterns:
          - "tokio*"
          - "futures*"
          - "async-trait"
      windows:
        patterns:
          - "windows"
          - "windows-*"

  # === Cargo de l'app shell (séparé du workspace) ===
  - package-ecosystem: cargo
    directory: /app/src-tauri
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels: ["dependencies", "tauri"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      tauri:
        patterns:
          - "tauri*"

  # === Frontend npm/pnpm ===
  - package-ecosystem: npm
    directory: /app
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels: ["dependencies", "frontend"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      svelte:
        patterns:
          - "svelte*"
          - "@sveltejs/*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"

  # === GitHub Actions ===
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3
    labels: ["dependencies", "ci"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
