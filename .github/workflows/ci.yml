name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Tous les crates sont warning-clean ; on bloque la CI sur tout warning
  # promu en error. Les variants d'enum avec fields anonymes utilisent
  # `#[allow(missing_docs)]` quand la doc inline du variant suffit.
  RUSTFLAGS: "-D warnings"

jobs:
  # ─── Rust : build + test workspace complet sur Windows ──────────────────
  rust-test:
    name: Rust (cargo test)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain (MSVC stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
          components: clippy, rustfmt

      - name: Cache cargo registry + target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (informational)
        # Notre lib utilise clippy::pedantic qui a 81 suggestions actuelles
        # (cast_lossless, etc.) — cleanup en cours, voir backlog
        # « clippy pedantic cleanup ». Pour l'instant on log mais on ne
        # bloque pas la CI.
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

      - name: cargo test --workspace
        run: cargo test --workspace --no-fail-fast

  # ─── Frontend : svelte-check ─────────────────────────────────────────────
  frontend-check:
    name: Frontend (svelte-check)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: svelte-check
        run: pnpm exec svelte-check --tsconfig ./tsconfig.json --fail-on-warnings
